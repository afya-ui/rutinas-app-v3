<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rutinas</title>

<style>
body {
  font-family: -apple-system, sans-serif;
  background: #f7f7f7;
  margin: 0;
  padding: 16px;
}

h1 {
  margin-bottom: 8px;
}

.section {
  margin-top: 20px;
}

.card {
  background: white;
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.done {
  text-decoration: line-through;
  opacity: 0.5;
}

button {
  background: #22c55e;
  color: white;
  border: none;
  border-radius: 8px;
  padding: 6px 10px;
}
</style>
</head>

<body>

<h1>Hoy</h1>
<div id="status">Cargando...</div>

<div class="section">
  <h2>Mañana</h2>
  <div id="manana"></div>
</div>

<div class="section">
  <h2>Tarde</h2>
  <div id="tarde"></div>
</div>

<div class="section">
  <h2>Noche</h2>
  <div id="noche"></div>
</div>

<script>

const API = "/.netlify/functions/sheets";

let plan = [];
let checks = [];

async function cargar() {
  try {

    const [planRes, checksRes] = await Promise.all([
      fetch(API, {
        method: "POST",
        body: JSON.stringify({ action: "getPlan" })
      }),
      fetch(API, {
        method: "POST",
        body: JSON.stringify({ action: "getChecks" })
      })
    ]);

    const planData = await planRes.json();
    const checksData = await checksRes.json();

    plan = planData;
    checks = checksData;

    document.getElementById("status").innerText = "Sincronizado";

    render();

  } catch (e) {
    document.getElementById("status").innerText = "Error conexión";
    console.error(e);
  }
}

function activoHoy(p) {
  if (!p.inicio || !p.diasCiclo) return true;

  const hoy = new Date();
  const inicio = new Date(p.inicio);

  const diff = Math.floor((hoy - inicio) / (1000 * 60 * 60 * 24));

  return diff >= 0 && diff < parseInt(p.diasCiclo);
}

function render() {

  ["manana", "tarde", "noche"].forEach(t => {
    document.getElementById(t).innerHTML = "";
  });

  const hoy = new Date().toISOString().split("T")[0];

  plan
    .filter(p => activoHoy(p))
    .forEach(p => {

      const container = document.getElementById(p.tiempo);

      if (!container) return;

      const isDone = checks.find(c =>
        c.nombre === p.nombre &&
        c.fecha === hoy &&
        c.tiempo === p.tiempo
      );

      const div = document.createElement("div");
      div.className = "card " + (isDone ? "done" : "");

      div.innerHTML = `
        <span>${p.nombre}</span>
        <button onclick="toggle('${p.nombre}','${p.tiempo}')">
          ${isDone ? "✓" : "OK"}
        </button>
      `;

      container.appendChild(div);
    });
}

async function toggle(nombre, tiempo) {

  const hoy = new Date().toISOString().split("T")[0];

  await fetch(API, {
    method: "POST",
    body: JSON.stringify({
      action: "toggleCheck",
      nombre,
      tiempo,
      fecha: hoy
    })
  });

  cargar();
}

cargar();

</script>

</body>
</html>
