<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#f7f7f5" />
<title>Rutinas v3 simple</title>

<style>
:root{
  --bg:#f7f7f5;
  --card:#fff;
  --text:#181816;
  --muted:#6d6d68;
  --border:rgba(0,0,0,.10);
  --green:#1D9E75;
  --amber-bg:#FAEEDA;
  --amber-text:#7A4B00;
  --radius:18px;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
.app{
  max-width:520px;
  margin:0 auto;
  padding:calc(18px + env(safe-area-inset-top)) 16px calc(40px + env(safe-area-inset-bottom));
}
.top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  margin-bottom:14px;
}
h1{
  font-size:34px;
  line-height:1;
  margin:0 0 8px;
  letter-spacing:-.04em;
}
.date{
  color:var(--muted);
  font-size:15px;
}
.status{
  font-size:13px;
  color:var(--muted);
  display:flex;
  align-items:center;
  gap:6px;
  margin-top:4px;
}
.dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:var(--muted);
}
.dot.ok{background:var(--green)}
.dot.err{background:#E24B4A}
.summary{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:14px;
  margin:14px 0 16px;
}
.summary-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:8px;
}
.summary-title{
  font-size:15px;
  font-weight:650;
}
.summary-pct{
  font-size:18px;
  font-weight:700;
}
.bar{
  height:8px;
  background:rgba(0,0,0,.08);
  border-radius:999px;
  overflow:hidden;
}
.fill{
  height:100%;
  width:0%;
  background:var(--green);
  border-radius:999px;
  transition:.25s width ease;
}
.summary-foot{
  display:flex;
  justify-content:space-between;
  margin-top:8px;
  font-size:13px;
  color:var(--muted);
}
.time-section{
  margin-top:14px;
}
.time-header{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  padding:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  cursor:pointer;
  user-select:none;
}
.time-title-wrap{
  display:flex;
  align-items:center;
  gap:8px;
}
.time-title{
  font-size:20px;
  font-weight:800;
}
.caret{
  color:var(--muted);
  font-size:15px;
  width:18px;
  text-align:center;
}
.time-count{
  font-size:14px;
  color:var(--muted);
  font-weight:650;
}
.time-body{
  margin-top:8px;
  display:none;
}
.time-section.open .time-body{
  display:block;
}
.category-group{
  margin-bottom:12px;
}
.category-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  color:var(--muted);
  font-size:13px;
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:.04em;
  padding:10px 6px 7px;
  cursor:pointer;
  user-select:none;
}
.category-title{
  display:flex;
  align-items:center;
  gap:8px;
}
.category-caret{
  color:var(--muted);
  font-size:14px;
  width:14px;
}
.category-icon{
  font-size:16px;
}
.category-count{
  font-size:12px;
  color:var(--muted);
}
.category-body{
  display:block;
}
.item{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:13px 12px;
  margin-bottom:9px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}
.item-left{
  min-width:0;
  flex:1;
  display:flex;
  gap:10px;
  align-items:flex-start;
  cursor:pointer;
}
.item-icon{
  width:24px;
  flex:0 0 24px;
  font-size:18px;
  line-height:1.2;
  margin-top:1px;
}
.item-text{
  min-width:0;
}
.item-name{
  font-size:16px;
  font-weight:650;
  line-height:1.25;
}
.item.done .item-name{
  text-decoration:line-through;
  color:#9b9b95;
}
.item-meta{
  margin-top:3px;
  font-size:12px;
  color:var(--muted);
  line-height:1.35;
}
.badge{
  display:inline-block;
  margin-left:4px;
  padding:2px 7px;
  border-radius:999px;
  background:var(--amber-bg);
  color:var(--amber-text);
  font-size:11px;
  vertical-align:1px;
}
.check{
  width:34px;
  height:34px;
  flex:0 0 34px;
  border-radius:50%;
  border:1.5px solid var(--border);
  background:white;
  color:white;
  font-size:18px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}
.item.done .check{
  background:var(--green);
  border-color:var(--green);
}
.empty{
  border:1px dashed var(--border);
  color:var(--muted);
  border-radius:14px;
  padding:14px;
  font-size:14px;
  text-align:center;
  background:rgba(255,255,255,.45);
  margin-bottom:9px;
}
.small-btn{
  border:1px solid var(--border);
  background:var(--card);
  color:var(--text);
  border-radius:999px;
  padding:8px 12px;
  font-size:13px;
  cursor:pointer;
}
.error-box{
  display:none;
  background:#fff;
  border:1px solid rgba(226,75,74,.25);
  color:#8a1f1f;
  border-radius:14px;
  padding:12px;
  margin:12px 0;
  font-size:13px;
  line-height:1.45;
  white-space:pre-wrap;
}
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.38);
  display:none;
  align-items:flex-end;
  justify-content:center;
  z-index:999;
}
.modal-card{
  width:100%;
  max-width:520px;
  max-height:82vh;
  overflow:auto;
  background:var(--card);
  border-radius:24px 24px 0 0;
  padding:18px 16px calc(24px + env(safe-area-inset-bottom));
}
.modal-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  margin-bottom:12px;
}
.modal-title{
  font-size:24px;
  line-height:1.1;
  font-weight:800;
  letter-spacing:-.03em;
}
.modal-subtitle{
  margin-top:6px;
  color:var(--muted);
  font-size:13px;
}
.modal-close{
  border:1px solid var(--border);
  background:#fff;
  border-radius:999px;
  width:34px;
  height:34px;
  font-size:20px;
  cursor:pointer;
}
.history-stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin:14px 0;
}
.stat-card{
  border:1px solid var(--border);
  border-radius:14px;
  padding:10px;
  background:#fff;
}
.stat-value{
  font-size:20px;
  font-weight:800;
}
.stat-label{
  font-size:12px;
  color:var(--muted);
  margin-top:3px;
}
.history-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid rgba(0,0,0,.07);
  padding:10px 2px;
  font-size:14px;
}
.history-row:last-child{
  border-bottom:none;
}
.history-empty{
  color:var(--muted);
  text-align:center;
  padding:20px 8px;
  border:1px dashed var(--border);
  border-radius:14px;
}
</style>
</head>

<body>
<div class="app">
  <div class="top">
    <div>
      <h1>Hoy</h1>
      <div class="date" id="date"></div>
      <div class="status"><span class="dot" id="status-dot"></span><span id="status">Cargando...</span></div>
    </div>
    <button class="small-btn" onclick="cargar()">Actualizar</button>
  </div>

  <div class="error-box" id="error-box"></div>

  <div class="summary">
    <div class="summary-row">
      <div class="summary-title">Progreso del día</div>
      <div class="summary-pct" id="pct">0%</div>
    </div>
    <div class="bar"><div class="fill" id="fill"></div></div>
    <div class="summary-foot">
      <span id="done-count">0/0 completados</span>
      <span id="pending-count">0 pendientes</span>
    </div>
  </div>

  <section class="time-section" id="sec-manana">
    <div class="time-header" onclick="toggleSection('manana')">
      <div class="time-title-wrap">
        <div class="caret" id="caret-manana">▸</div>
        <div class="time-title">Mañana</div>
      </div>
      <div class="time-count" id="count-manana"></div>
    </div>
    <div class="time-body" id="manana"></div>
  </section>

  <section class="time-section" id="sec-tarde">
    <div class="time-header" onclick="toggleSection('tarde')">
      <div class="time-title-wrap">
        <div class="caret" id="caret-tarde">▸</div>
        <div class="time-title">Tarde</div>
      </div>
      <div class="time-count" id="count-tarde"></div>
    </div>
    <div class="time-body" id="tarde"></div>
  </section>

  <section class="time-section" id="sec-noche">
    <div class="time-header" onclick="toggleSection('noche')">
      <div class="time-title-wrap">
        <div class="caret" id="caret-noche">▸</div>
        <div class="time-title">Noche</div>
      </div>
      <div class="time-count" id="count-noche"></div>
    </div>
    <div class="time-body" id="noche"></div>
  </section>
</div>

<div class="modal" id="history-modal" onclick="cerrarModalSiFondo(event)">
  <div class="modal-card">
    <div class="modal-top">
      <div>
        <div class="modal-title" id="modal-title">Producto</div>
        <div class="modal-subtitle" id="modal-subtitle"></div>
      </div>
      <button class="modal-close" onclick="cerrarModal()">×</button>
    </div>

    <div id="modal-content"></div>
  </div>
</div>

<script>
const API = "/.netlify/functions/sheets";
const TIMES = ["manana","tarde","noche"];
const TIME_LABEL = { manana:"Mañana", tarde:"Tarde", noche:"Noche" };

const CAT_LABEL = {
  dermato:"Derma",
  derma:"Derma",
  suplementos:"Suplementos",
  suplemento:"Suplementos",
  ejercicio:"Ejercicio",
  bienestar:"Bienestar",
  sueno:"Sueño",
  sueño:"Sueño",
  wellness:"Wellness"
};

const CAT_ICON = {
  dermato:"🧴",
  derma:"🧴",
  suplementos:"💊",
  suplemento:"💊",
  ejercicio:"🏋️",
  bienestar:"🧘",
  sueno:"😴",
  sueño:"😴",
  wellness:"✨"
};

const CAT_ORDER = {
  dermato:1,
  derma:1,
  suplementos:2,
  suplemento:2,
  ejercicio:3,
  bienestar:4,
  sueno:5,
  sueño:5,
  wellness:6
};

const DAYS_ES = ["domingo","lunes","martes","miercoles","jueves","viernes","sabado"];

let planObj = {};
let checksObj = {};
let todayItems = [];
let openSections = {};
let openCategories = {};

function pad(n){ return String(n).padStart(2,"0"); }

function todayKey(){
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

function todayDow(){
  return DAYS_ES[new Date().getDay()];
}

function currentTimeSection(){
  const h = new Date().getHours();
  if(h >= 5 && h < 12) return "manana";
  if(h >= 12 && h < 19) return "tarde";
  return "noche";
}

function initOpenSections(){
  const saved = localStorage.getItem("openSectionsV3");
  if(saved){
    try{
      openSections = JSON.parse(saved);
    }catch(e){
      openSections = { manana:false, tarde:false, noche:false };
    }
  }else{
    openSections = { manana:false, tarde:false, noche:false };
    openSections[currentTimeSection()] = true;
  }

  const savedCats = localStorage.getItem("openCategoriesV3");
  if(savedCats){
    try{
      openCategories = JSON.parse(savedCats);
    }catch(e){
      openCategories = {};
    }
  }
}

function saveOpenSections(){
  localStorage.setItem("openSectionsV3", JSON.stringify(openSections));
}

function saveOpenCategories(){
  localStorage.setItem("openCategoriesV3", JSON.stringify(openCategories));
}

function toggleSection(t){
  openSections[t] = !openSections[t];
  saveOpenSections();
  applyOpenState();
}

function applyOpenState(){
  TIMES.forEach(t=>{
    const sec = document.getElementById("sec-"+t);
    const caret = document.getElementById("caret-"+t);
    const isOpen = !!openSections[t];
    sec.classList.toggle("open", isOpen);
    caret.textContent = isOpen ? "▾" : "▸";
  });
}

function cleanId(s){
  return String(s || "")
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/\s+/g,"-")
    .replace(/[^a-zA-Z0-9-_]/g,"");
}

function toggleCategoria(id){
  openCategories[id] = !openCategories[id];
  saveOpenCategories();

  const body = document.getElementById("cat-body-" + id);
  const caret = document.getElementById("cat-caret-" + id);

  if(body) body.style.display = openCategories[id] ? "block" : "none";
  if(caret) caret.textContent = openCategories[id] ? "▾" : "▸";
}

function localDateText(){
  const d = new Date();
  const meses = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
  const dia = todayDow();
  return dia.charAt(0).toUpperCase()+dia.slice(1)+`, ${d.getDate()} de ${meses[d.getMonth()]}`;
}

function setStatus(text, type){
  document.getElementById("status").textContent = text;
  const dot = document.getElementById("status-dot");
  dot.className = "dot" + (type === "ok" ? " ok" : type === "err" ? " err" : "");
}

function showError(msg){
  const box = document.getElementById("error-box");
  if(!msg){
    box.style.display = "none";
    box.textContent = "";
    return;
  }
  box.style.display = "block";
  box.textContent = msg;
}

async function postSheets(action, data = {}){
  const res = await fetch(API, {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ action, data })
  });

  const raw = await res.text();
  let json;
  try {
    json = JSON.parse(raw);
  } catch(e) {
    throw new Error(`La función no regresó JSON.\nStatus: ${res.status}\nRespuesta: ${raw.slice(0,250)}`);
  }

  if(!res.ok || json.error){
    throw new Error(json.error || `Error HTTP ${res.status}`);
  }

  return json;
}

async function cargar(){
  try{
    showError("");
    setStatus("Sincronizando...", "");

    const fecha = todayKey();

    const [planRes, checksRes] = await Promise.all([
      postSheets("getPlan"),
      postSheets("getChecks", { fecha })
    ]);

    planObj = planRes.plan || {};
    checksObj = checksRes.checks || {};

    setStatus("Sincronizado", "ok");
    render();

  }catch(e){
    console.error(e);
    setStatus("Error conexión", "err");
    showError(e.message || String(e));
  }
}

function getDiasRestantes(cfg){
  if(!cfg || !cfg.inicio || !cfg.diasCiclo) return null;
  const inicio = new Date(cfg.inicio + "T12:00:00");
  const hoy = new Date(todayKey() + "T12:00:00");
  const diff = Math.round((hoy - inicio) / 86400000);
  const total = Number(cfg.diasCiclo);
  if(!total) return null;
  return Math.max(0, total - diff);
}

function isActiveCfg(cfg){
  if(!cfg) return false;

  const dow = todayDow();
  const dias = cfg.days ?? cfg.dias ?? "todos";

  let dayOk = false;
  if(dias === "todos") dayOk = true;
  else if(Array.isArray(dias)) dayOk = dias.includes(dow);
  else dayOk = String(dias).split(",").map(x=>x.trim()).includes(dow);

  if(!dayOk) return false;

  if(cfg.inicio){
    if(cfg.inicio > todayKey()) return false;
    if(cfg.diasCiclo && getDiasRestantes(cfg) <= 0) return false;
  }

  return true;
}

function flattenPlan(){
  const out = [];
  Object.entries(planObj || {}).forEach(([categoria, times])=>{
    TIMES.forEach(tiempo=>{
      Object.entries((times && times[tiempo]) || {}).forEach(([nombre, cfg])=>{
        if(isActiveCfg(cfg)){
          out.push({
            categoria,
            tiempo,
            nombre,
            note: cfg.note || cfg.nota || "",
            diasRestantes: cfg.diasCiclo ? getDiasRestantes(cfg) : null
          });
        }
      });
    });
  });

  out.sort((a,b)=>{
    const catDiff = (CAT_ORDER[a.categoria] || 99) - (CAT_ORDER[b.categoria] || 99);
    if(catDiff !== 0) return catDiff;
    return a.nombre.localeCompare(b.nombre);
  });

  return out;
}

function getCheck(categoria, tiempo, nombre){
  return !!(checksObj &&
    checksObj[categoria] &&
    checksObj[categoria][tiempo] &&
    checksObj[categoria][tiempo][nombre]);
}

function escapeAttr(s){
  return String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/'/g,"&#39;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function escapeHtml(s){
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function getCategoriaLabel(categoria){
  return CAT_LABEL[categoria] || categoria || "";
}

function getCategoriaIcon(categoria){
  return CAT_ICON[categoria] || "";
}

function groupByCategoria(items){
  const groups = {};

  items.forEach(it=>{
    const cat = it.categoria || "__sin_categoria__";
    if(!groups[cat]) groups[cat] = [];
    groups[cat].push(it);
  });

  return Object.keys(groups).sort((a,b)=>{
    return (CAT_ORDER[a] || 99) - (CAT_ORDER[b] || 99);
  }).map(cat=>({
    categoria: cat,
    items: groups[cat]
  }));
}

function formatFecha(fecha){
  if(!fecha) return "";
  const partes = fecha.split("-");
  if(partes.length !== 3) return fecha;
  return `${partes[2]}/${partes[1]}/${partes[0]}`;
}

async function abrirHistorial(categoria, tiempo, nombre){
  try{
    document.getElementById("modal-title").textContent = nombre;
    document.getElementById("modal-subtitle").textContent = `${getCategoriaLabel(categoria)} · ${TIME_LABEL[tiempo] || tiempo}`;
    document.getElementById("modal-content").innerHTML = `<div class="history-empty">Cargando historial...</div>`;
    document.getElementById("history-modal").style.display = "flex";

    const res = await postSheets("getHistorial", {
      categoria,
      tiempo,
      nombre
    });

    const historial = res.historial || [];
    const usados = historial.filter(h=>h.completado).length;
    const total = historial.length;
    const pendientes = total - usados;
    const pct = total ? Math.round(usados / total * 100) : 0;

    let html = `
      <div class="history-stats">
        <div class="stat-card">
          <div class="stat-value">${usados}</div>
          <div class="stat-label">Usados</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${pendientes}</div>
          <div class="stat-label">Pendientes</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${pct}%</div>
          <div class="stat-label">Cumplimiento</div>
        </div>
      </div>
    `;

    if(!historial.length){
      html += `<div class="history-empty">Todavía no hay historial para este producto.</div>`;
    }else{
      historial.forEach(h=>{
        html += `
          <div class="history-row">
            <span>${formatFecha(h.fecha)}</span>
            <strong>${h.completado ? "✅ Aplicado" : "❌ No aplicado"}</strong>
          </div>
        `;
      });
    }

    document.getElementById("modal-content").innerHTML = html;

  }catch(e){
    console.error(e);
    document.getElementById("modal-content").innerHTML = `<div class="history-empty">Error cargando historial.</div>`;
  }
}

function cerrarModal(){
  document.getElementById("history-modal").style.display = "none";
}

function cerrarModalSiFondo(event){
  if(event.target && event.target.id === "history-modal"){
    cerrarModal();
  }
}

function renderItem(it){
  const doneItem = getCheck(it.categoria, it.tiempo, it.nombre);
  const badge = it.diasRestantes !== null ? `<span class="badge">faltan ${it.diasRestantes}d</span>` : "";
  const nota = it.note ? `${escapeHtml(it.note)}` : "";
  const icon = CAT_ICON[it.categoria] || "•";

  const div = document.createElement("div");
  div.className = "item" + (doneItem ? " done" : "");
  div.innerHTML = `
    <div class="item-left" onclick="abrirHistorial('${escapeAttr(it.categoria)}','${escapeAttr(it.tiempo)}','${escapeAttr(it.nombre)}')">
      <div class="item-icon">${icon}</div>
      <div class="item-text">
        <div class="item-name">${escapeHtml(it.nombre)}</div>
        <div class="item-meta">${nota}${badge}</div>
      </div>
    </div>
    <button class="check" aria-label="Completar"
      onclick="toggleCheck('${escapeAttr(it.categoria)}','${escapeAttr(it.tiempo)}','${escapeAttr(it.nombre)}')">✓</button>
  `;
  return div;
}

function render(){
  document.getElementById("date").textContent = localDateText();

  TIMES.forEach(t=>{
    document.getElementById(t).innerHTML = "";
    document.getElementById("count-"+t).textContent = "";
  });

  todayItems = flattenPlan();

  let total = todayItems.length;
  let done = todayItems.filter(it => getCheck(it.categoria, it.tiempo, it.nombre)).length;
  let pct = total ? Math.round(done / total * 100) : 0;

  document.getElementById("pct").textContent = pct + "%";
  document.getElementById("fill").style.width = pct + "%";
  document.getElementById("done-count").textContent = `${done}/${total} completados`;
  document.getElementById("pending-count").textContent = `${Math.max(0,total-done)} pendientes`;

  TIMES.forEach(tiempo=>{
    const items = todayItems.filter(it => it.tiempo === tiempo);
    const cont = document.getElementById(tiempo);
    const doneTime = items.filter(it => getCheck(it.categoria, it.tiempo, it.nombre)).length;
    document.getElementById("count-"+tiempo).textContent = items.length ? `${doneTime}/${items.length}` : "0/0";

    if(!items.length){
      cont.innerHTML = `<div class="empty">Nada programado para ${TIME_LABEL[tiempo].toLowerCase()}.</div>`;
      return;
    }

    const grupos = groupByCategoria(items);

    grupos.forEach(grupo=>{
      const wrapper = document.createElement("div");
      wrapper.className = "category-group";

      if(grupo.categoria !== "__sin_categoria__"){
        const catId = cleanId(tiempo + "-" + grupo.categoria);

        if(openCategories[catId] === undefined){
          openCategories[catId] = true;
        }

        const header = document.createElement("div");
        header.className = "category-header";
        header.onclick = () => toggleCategoria(catId);
        header.innerHTML = `
          <div class="category-title">
            <span class="category-caret" id="cat-caret-${catId}">${openCategories[catId] ? "▾" : "▸"}</span>
            <span class="category-icon">${getCategoriaIcon(grupo.categoria)}</span>
            <span>${escapeHtml(getCategoriaLabel(grupo.categoria))}</span>
          </div>
          <span class="category-count">${grupo.items.length}</span>
        `;
        wrapper.appendChild(header);

        const body = document.createElement("div");
        body.className = "category-body";
        body.id = "cat-body-" + catId;
        body.style.display = openCategories[catId] ? "block" : "none";

        grupo.items.forEach(it=>{
          body.appendChild(renderItem(it));
        });

        wrapper.appendChild(body);
      }else{
        grupo.items.forEach(it=>{
          wrapper.appendChild(renderItem(it));
        });
      }

      cont.appendChild(wrapper);
    });

    saveOpenCategories();
  });

  applyOpenState();
}

async function toggleCheck(categoria, tiempo, nombre){
  try{
    const current = getCheck(categoria, tiempo, nombre);
    if(!checksObj[categoria]) checksObj[categoria] = {};
    if(!checksObj[categoria][tiempo]) checksObj[categoria][tiempo] = {};
    checksObj[categoria][tiempo][nombre] = !current;
    render();

    await postSheets("saveCheck", {
      fecha: todayKey(),
      categoria,
      tiempo,
      nombre,
      completado: !current
    });

    setStatus("Sincronizado", "ok");
  }catch(e){
    console.error(e);
    setStatus("Error guardando", "err");
    showError(e.message || String(e));
    await cargar();
  }
}

initOpenSections();
applyOpenState();
cargar();
</script>
</body>
</html>
