<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Ritmo" />
<meta name="theme-color" content="#F6F1E8" />
<link rel="apple-touch-icon" sizes="180x180" href="icon-180-3.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192-3.png" />
<link rel="icon" type="image/png" sizes="512x512" href="icon-512-3.png" />
<link rel="manifest" href="manifest.webmanifest" />
<title>Ritmo</title>

<style>
:root{
  --bg:#F6F1E8;
  --card:#FFFCF6;
  --text:#181816;
  --muted:#6d6d68;
  --border:rgba(0,0,0,.10);
  --green:#4F7D5B;
  --amber-bg:#EFE3C8;
  --amber-text:#6D5630;
  --radius:18px;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
.app{
  max-width:520px;
  margin:0 auto;
  padding:calc(18px + env(safe-area-inset-top)) 16px calc(40px + env(safe-area-inset-bottom));
}
.top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  margin-bottom:14px;
}
.top-actions{
  display:flex;
  align-items:center;
  gap:8px;
  flex-shrink:0;
}
.top-actions select{
  border:1px solid var(--border);
  background:#fff;
  color:var(--text);
  border-radius:999px;
  padding:8px 10px;
  font-size:13px;
  font-weight:750;
  outline:none;
  max-width:118px;
}
h1{
  font-size:34px;
  line-height:1;
  margin:0 0 8px;
  letter-spacing:-.04em;
}
.date{
  color:var(--muted);
  font-size:15px;
}
.status{
  font-size:13px;
  color:var(--muted);
  display:flex;
  align-items:center;
  gap:6px;
  margin-top:4px;
}
.dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:var(--muted);
}
.dot.ok{background:var(--green)}
.dot.err{background:#E24B4A}
.summary{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:14px;
  margin:14px 0 16px;
}
.summary-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:8px;
}
.summary-title{
  font-size:15px;
  font-weight:650;
}
.summary-pct{
  font-size:18px;
  font-weight:800;
  text-align:right;
}
.bar{
  height:8px;
  background:rgba(0,0,0,.08);
  border-radius:999px;
  overflow:hidden;
}
.fill{
  height:100%;
  width:0%;
  background:var(--green);
  border-radius:999px;
  transition:.25s width ease;
}
.summary-foot{
  display:flex;
  justify-content:space-between;
  margin-top:8px;
  font-size:13px;
  color:var(--muted);
}

.view-filter{
  display:none;
}.view-filter label{
  display:none;
}
.view-filter select{
  width:100%;
  border:1px solid var(--border);
  background:#fff;
  color:var(--text);
  border-radius:999px;
  padding:13px 16px;
  font-size:17px;
  font-weight:800;
  outline:none;
  box-shadow:0 1px 0 rgba(0,0,0,.03);
}
.filter-note{
  display:none;
}
.categories-container{
  margin-top:4px;
}


.time-section{
  margin-top:14px;
}
.time-header{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  padding:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  cursor:pointer;
  user-select:none;
}
.time-title-wrap{
  display:flex;
  align-items:center;
  gap:8px;
}
.time-title{
  font-size:20px;
  font-weight:800;
}
.caret{
  color:var(--muted);
  font-size:15px;
  width:18px;
  text-align:center;
}
.time-count{
  font-size:14px;
  color:var(--muted);
  font-weight:650;
}
.time-body{
  margin-top:8px;
  display:none;
}
.time-section.open .time-body{
  display:block;
}
.category-group{
  margin-bottom:14px;
}
.category-header{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  padding:16px 14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  color:var(--text);
  user-select:none;
  cursor:pointer;
  box-shadow:0 1px 0 rgba(0,0,0,.03);
}
.category-title{
  display:flex;
  align-items:center;
  gap:12px;
  flex:1;
  min-width:0;
  font-size:17px;
  font-weight:850;
  text-transform:uppercase;
  letter-spacing:.04em;
}
.category-caret{
  color:var(--muted);
  font-size:22px;
  width:18px;
  text-align:center;
}
.category-icon{
  font-size:21px;
  width:26px;
  text-align:center;
}
.category-actions{
  display:flex;
  align-items:center;
  gap:10px;
}
.category-count{
  font-size:17px;
  color:var(--text);
  font-weight:850;
  white-space:nowrap;
}
.category-summary-btn{
  display:none;
}
.category-body{
  display:block;
  margin-top:10px;
}

.item{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:13px 12px;
  margin-bottom:9px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}
.item-left{
  min-width:0;
  flex:1;
  display:flex;
  gap:10px;
  align-items:flex-start;
  cursor:pointer;
}
.item-icon{
  width:24px;
  flex:0 0 24px;
  font-size:18px;
  line-height:1.2;
  margin-top:1px;
}
.item-text{
  min-width:0;
}
.item-name{
  font-size:16px;
  font-weight:650;
  line-height:1.25;
}
.item.done .item-name{
  text-decoration:line-through;
  color:#9b9b95;
}
.item-meta{
  margin-top:3px;
  font-size:12px;
  color:var(--muted);
  line-height:1.35;
}
.badge{
  display:inline-block;
  margin-left:4px;
  padding:2px 7px;
  border-radius:999px;
  background:var(--amber-bg);
  color:var(--amber-text);
  font-size:11px;
  vertical-align:1px;
}
.check{
  width:34px;
  height:34px;
  flex:0 0 34px;
  border-radius:50%;
  border:1.5px solid var(--border);
  background:white;
  color:white;
  font-size:18px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}
.item.done .check{
  background:var(--green);
  border-color:var(--green);
}
.empty{
  border:1px dashed var(--border);
  color:var(--muted);
  border-radius:14px;
  padding:14px;
  font-size:14px;
  text-align:center;
  background:rgba(255,255,255,.45);
  margin-bottom:9px;
}
.small-btn{
  border:1px solid var(--border);
  background:var(--card);
  color:var(--text);
  border-radius:999px;
  padding:8px 12px;
  font-size:13px;
  cursor:pointer;
}
.error-box{
  display:none;
  background:#fff;
  border:1px solid rgba(226,75,74,.25);
  color:#8a1f1f;
  border-radius:14px;
  padding:12px;
  margin:12px 0;
  font-size:13px;
  line-height:1.45;
  white-space:pre-wrap;
}
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.38);
  display:none;
  align-items:flex-end;
  justify-content:center;
  z-index:999;
}
.modal-card{
  width:100%;
  max-width:520px;
  max-height:82vh;
  overflow:auto;
  background:var(--card);
  border-radius:24px 24px 0 0;
  padding:18px 16px calc(24px + env(safe-area-inset-bottom));
}
.modal-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  margin-bottom:12px;
}
.modal-title{
  font-size:24px;
  line-height:1.1;
  font-weight:800;
  letter-spacing:-.03em;
}
.modal-subtitle{
  margin-top:6px;
  color:var(--muted);
  font-size:13px;
}
.modal-close{
  border:1px solid var(--border);
  background:#fff;
  border-radius:999px;
  width:34px;
  height:34px;
  font-size:20px;
  cursor:pointer;
}
.history-stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin:14px 0;
}
.stat-card{
  border:1px solid var(--border);
  border-radius:14px;
  padding:10px;
  background:#fff;
}
.stat-value{
  font-size:20px;
  font-weight:800;
}
.stat-label{
  font-size:12px;
  color:var(--muted);
  margin-top:3px;
}
.history-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid rgba(0,0,0,.07);
  padding:10px 2px;
  font-size:14px;
}
.history-row:last-child{
  border-bottom:none;
}
.history-empty{
  color:var(--muted);
  text-align:center;
  padding:20px 8px;
  border:1px dashed var(--border);
  border-radius:14px;
}
.product-summary-row{
  border:1px solid var(--border);
  border-radius:14px;
  padding:12px;
  margin-bottom:9px;
  background:#fff;
}
.product-summary-top{
  display:flex;
  justify-content:space-between;
  gap:10px;
  font-size:15px;
  font-weight:750;
}
.product-summary-meta{
  margin-top:5px;
  color:var(--muted);
  font-size:13px;
}

.view-mode{
  display:flex;
  background:#fff;
  border:1px solid var(--border);
  border-radius:999px;
  padding:3px;
  gap:3px;
}
.view-mode button{
  border:0;
  background:transparent;
  color:var(--muted);
  border-radius:999px;
  padding:7px 10px;
  font-size:13px;
  font-weight:800;
  cursor:pointer;
}
.view-mode button.active{
  background:var(--text);
  color:#fff;
}
.ritmo-msg{
  margin-top:8px;
  font-size:14px;
  color:var(--muted);
  line-height:1.4;
}
.ritmo-controls{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin:0 0 12px;
}
.ritmo-pill{
  border:1px solid var(--border);
  background:#fff;
  color:var(--muted);
  border-radius:999px;
  padding:10px 8px;
  font-size:13px;
  font-weight:800;
  cursor:pointer;
}
.ritmo-pill.active{
  background:var(--text);
  color:#fff;
  border-color:var(--text);
}
.ritmo-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:16px 14px;
  margin-bottom:12px;
}
.ritmo-card-title{
  font-size:17px;
  font-weight:850;
  margin-bottom:10px;
}
.ritmo-insight{
  font-size:17px;
  font-weight:750;
  line-height:1.35;
}
.ritmo-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  padding:12px 0;
  border-bottom:1px solid rgba(0,0,0,.07);
}
.ritmo-row.clickable{
  cursor:pointer;
}
.ritmo-row.clickable:hover{
  opacity:.78;
}
.ritmo-row:last-child{border-bottom:none;}
.ritmo-row-left{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:750;
}
.ritmo-dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:var(--green);
  flex:0 0 10px;
}
.ritmo-dot.mid{background:#E4A72C;}
.ritmo-dot.low{background:#E35D5B;}
.ritmo-value{font-weight:900;}
.ritmo-mini-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:12px;
}
.ritmo-mini{
  background:#fff;
  border:1px solid var(--border);
  border-radius:16px;
  padding:13px;
}
.ritmo-mini-label{
  color:var(--muted);
  font-size:12px;
  font-weight:750;
  margin-bottom:4px;
}
.ritmo-mini-value{
  font-size:18px;
  font-weight:900;
}
.ritmo-detail-btn{
  width:100%;
  border:0;
  background:var(--text);
  color:#fff;
  border-radius:16px;
  padding:15px;
  font-size:16px;
  font-weight:850;
  cursor:pointer;
  margin-bottom:12px;
}
.ritmo-detail{display:none;}
.ritmo-detail.open{display:block;}
.ritmo-empty{
  border:1px dashed var(--border);
  color:var(--muted);
  border-radius:14px;
  padding:14px;
  background:rgba(255,255,255,.45);
  text-align:center;
}

.product-group{
  border:1px solid var(--border);
  border-radius:16px;
  padding:13px;
  background:#fff;
  margin-bottom:10px;
}
.product-group-head{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  cursor:pointer;
}
.product-group-title{
  font-size:16px;
  font-weight:850;
}
.product-group-status{
  margin-top:4px;
  color:var(--muted);
  font-size:13px;
}
.product-group-value{
  font-weight:900;
  white-space:nowrap;
}
.product-hours{
  display:none;
  margin-top:10px;
  border-top:1px solid rgba(0,0,0,.07);
  padding-top:8px;
}
.product-group.open .product-hours{display:block;}
.hour-row{
  display:flex;
  justify-content:space-between;
  padding:8px 0;
  color:var(--muted);
  font-size:13px;
}
.hour-row strong{color:var(--text);}
.soft-status{
  border:1px solid var(--border);
  background:#fff;
  border-radius:16px;
  padding:14px;
  margin-bottom:12px;
  font-weight:750;
  line-height:1.35;
}

.category-ritmo-hero{
  border:1px solid var(--border);
  background:#fff;
  border-radius:20px;
  padding:16px;
  margin:14px 0 12px;
}
.category-ritmo-top{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:12px;
  margin-bottom:10px;
}
.category-ritmo-label{
  color:var(--muted);
  font-size:13px;
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:.04em;
}
.category-ritmo-message{
  margin-top:4px;
  font-size:18px;
  font-weight:850;
  line-height:1.2;
}
.category-ritmo-pct{
  font-size:42px;
  font-weight:950;
  letter-spacing:-.06em;
  line-height:.95;
}
.category-ritmo-note{
  margin-top:10px;
  color:var(--muted);
  font-size:14px;
  line-height:1.35;
  font-weight:650;
}
.product-group-value{
  color:var(--muted);
  font-size:18px;
}

.note{
  color:var(--muted);
  font-size:13px;
  line-height:1.4;
}


.single-stat{grid-template-columns:1fr !important;}
.ritmo-only-card{text-align:left;}
  .add-form{
  display:flex;
  flex-direction:column;
  gap:12px;
  margin-top:14px;
}

.add-form input,
.add-form select,
.add-form textarea{
  width:100%;
  border:1px solid var(--border);
  background:#fff;
  color:var(--text);
  border-radius:16px;
  padding:14px 14px;
  font-size:16px;
  font-weight:650;
  outline:none;
}

.add-form textarea{
  min-height:84px;
  resize:none;
}

.add-form label{
  font-size:13px;
  color:var(--muted);
  font-weight:800;
  margin-bottom:-6px;
}

.add-form button{
  width:100%;
  border:0;
  background:var(--text);
  color:#fff;
  border-radius:18px;
  padding:16px;
  font-size:17px;
  font-weight:900;
  cursor:pointer;
  margin-top:4px;
}

.add-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

@media(max-width:420px){
  .add-grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>
<div class="app">
  <div class="top">
    <div>
      <h1 id="main-title">Hoy</h1>
      <div class="date" id="date"></div>
      <div class="status"><span class="dot" id="status-dot"></span><span id="status">Cargando...</span></div>
    </div>
    <div class="top-actions">
      <div class="view-mode" aria-label="Modo de vista">
        <button id="btn-hoy" type="button" onclick="setViewMode('hoy')">Hoy</button>
        <button id="btn-ritmo" type="button" onclick="setViewMode('ritmo')">Mi ritmo</button>
        <button id="btn-add" type="button" onclick="openAddModal()">Agregar</button>
      </div>
      <select id="time-filter" onchange="setTimeFilter(this.value)" aria-label="Ver rutina">
        <option value="todo">Todo</option>
        <option value="manana">Mañana</option>
        <option value="tarde">Tarde</option>
        <option value="noche">Noche</option>
      </select>    </div>
  </div>

  <div class="error-box" id="error-box"></div>

  <div class="summary">
    <div class="summary-row">
      <div class="summary-title" id="summary-title">Ritmo de hoy</div>
      <div class="summary-pct" id="pct">0%</div>
    </div>
    <div id="ritmo-msg" class="ritmo-msg"></div>
    <div class="bar"><div class="fill" id="fill"></div></div>
    <div class="summary-foot">
      <span id="done-count">0/0 completados</span>
      <span id="pending-count">0 pendientes</span>
    </div>
  </div>


  <div class="filter-note" id="filter-note"></div>
  <div class="categories-container" id="categories-container"></div>
</div>

    <div class="add-form">
      <label>Nombre</label>
      <input id="p-nombre" placeholder="Ej. Doxiciclina 100 mg" />

      <div class="add-grid">
        <div>
          <label>Categoría</label>
          <select id="p-categoria">
            <option value="dermato">Derma</option>
            <option value="suplementos">Suplementos</option>
            <option value="ejercicio">Ejercicio</option>
            <option value="wellness">Wellness</option>
          </select>
        </div>

        <div>
          <label>Frecuencia</label>
          <select id="p-frecuencia">
            <option value="24h">Cada 24h</option>
            <option value="12h">Cada 12h</option>
            <option value="8h">Cada 8h</option>
          </select>
        </div>
      </div>

      <label>Horario</label>
      <select id="p-horario">
        <option value="mañana">Mañana</option>
        <option value="tarde">Tarde</option>
        <option value="noche">Noche</option>
        <option value="mañana,noche">Mañana y noche</option>
        <option value="mañana,tarde,noche">Mañana, tarde y noche</option>
      </select>

      <div class="add-grid">
        <div>
          <label>Inicio</label>
          <input id="p-inicio" type="date" />
        </div>

        <div>
          <label>Duración</label>
          <input id="p-duracion" type="number" placeholder="Días" />
        </div>
      </div>

      <label>Días</label>
      <select id="p-dias">
  <option value="todos">Todos los días</option>
  <option value="lunes,martes,miercoles,jueves,viernes">Lunes a viernes</option>
  <option value="sabado,domingo">Fines de semana</option>
  <option value="lunes">Lunes</option>
  <option value="martes">Martes</option>
  <option value="miercoles">Miércoles</option>
  <option value="jueves">Jueves</option>
  <option value="viernes">Viernes</option>
  <option value="sabado">Sábado</option>
  <option value="domingo">Domingo</option>
</select>

      <label>Nota</label>
      <textarea id="p-nota" placeholder="Ej. Después del desayuno"></textarea>

      <button onclick="guardarProducto()">Guardar producto</button>
    </div>
  </div>
</div>

<script>
const API = "/.netlify/functions/sheets";
const TIMES = ["manana","tarde","noche"];
const TIME_LABEL = { manana:"Mañana", tarde:"Tarde", noche:"Noche" };

const WELLNESS_ITEMS = [
  { nombre:"Meditación", note:"" },
  { nombre:"Sauna", note:"" },
  { nombre:"Hielos", note:"" }
];

const CAT_LABEL = {
  dermato:"Derma",
  derma:"Derma",
  suplementos:"Suplementos",
  suplemento:"Suplementos",
  ejercicio:"Ejercicio",
  bienestar:"Bienestar",
  sueno:"Sueño",

async function postSheets(action, data = {}){
  const res = await fetch(API, {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ action, data })
  });

  const raw = await res.text();
  let json;
  try {
    json = JSON.parse(raw);
  } catch(e) {
    throw new Error(`La función no regresó JSON.\nStatus: ${res.status}\nRespuesta: ${raw.slice(0,250)}`);
  }

  if(!res.ok || json.error){
    throw new Error(json.error || `Error HTTP ${res.status}`);
  }

  return json;
}

function getDiasRestantes(cfg){
  // Días futuros que faltan después de hoy.
  // Ejemplo: tratamiento 20 días que inició el 11/04, el 25/04 faltan 5 días: 26,27,28,29,30.
  if(!cfg || !cfg.inicio || !cfg.diasCiclo) return null;
  const inicio = new Date(cfg.inicio + "T12:00:00");
  const hoy = new Date(todayKey() + "T12:00:00");
  const total = Number(cfg.diasCiclo);
  if(!total) return null;

  const fin = new Date(inicio);
  fin.setDate(fin.getDate() + total - 1);

  const restantes = Math.round((fin - hoy) / 86400000);
  return Math.max(0, restantes);
}

function cicloActivoHoy(cfg){
  if(!cfg || !cfg.inicio || !cfg.diasCiclo) return true;
  const inicio = new Date(cfg.inicio + "T12:00:00");
  const hoy = new Date(todayKey() + "T12:00:00");
  const diff = Math.round((hoy - inicio) / 86400000);
  const total = Number(cfg.diasCiclo);
  if(!total) return true;

  return diff >= 0 && diff < total;
}

function isActiveCfg(cfg){
  if(!cfg) return false;

  const dow = todayDow();
  const dias = cfg.days ?? cfg.dias ?? "todos";

  let dayOk = false;
  if(dias === "todos") dayOk = true;
  else if(Array.isArray(dias)) dayOk = dias.includes(dow);
  else dayOk = String(dias).split(",").map(x=>x.trim()).includes(dow);

  if(!dayOk) return false;

  if(cfg.inicio){
    if(cfg.inicio > todayKey()) return false;
    if(cfg.diasCiclo && !cicloActivoHoy(cfg)) return false;
  }

  return true;
}

function flattenPlan(){
  const out = [];
  Object.entries(planObj || {}).forEach(([categoria, times])=>{
    TIMES.forEach(tiempo=>{
      Object.entries((times && times[tiempo]) || {}).forEach(([nombre, cfg])=>{
        if(isActiveCfg(cfg)){
          out.push({
            categoria,
            tiempo,
            nombre,
            note: cfg.note || cfg.nota || "",
            inicio: cfg.inicio || "",
            diasRestantes: cfg.diasCiclo ? getDiasRestantes(cfg) : null,
            diasCicloTotal: cfg.diasCiclo || null
          });
        }
      });
    });
  });

  TIMES.forEach(tiempo=>{
    WELLNESS_ITEMS.forEach(w=>{
      out.push({
        categoria:"wellness",
        tiempo,
        nombre:w.nombre,
        note:w.note || "",
        inicio:"",
        diasRestantes:null,
        diasCicloTotal:null
      });
    });
  });

  out.sort((a,b)=>{
    const catDiff = (CAT_ORDER[a.categoria] || 99) - (CAT_ORDER[b.categoria] || 99);
    if(catDiff !== 0) return catDiff;
    return a.nombre.localeCompare(b.nombre);
  });

  return out;
}

function formatFecha(fecha){
  if(!fecha) return "";
  const partes = fecha.split("-");
  if(partes.length !== 3) return fecha;
  return `${partes[2]}/${partes[1]}/${partes[0]}`;
}

function addDaysKey(fechaKey, dias){
  const d = new Date(fechaKey + "T12:00:00");
  d.setDate(d.getDate() + dias);
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

function normalizarFechaKey(valor){
  if(!valor) return "";
  const s = String(valor).trim();

  let m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if(m) return `${m[1]}-${pad(m[2])}-${pad(m[3])}`;

  m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
  if(m) return `${m[3]}-${pad(m[2])}-${pad(m[1])}`;

  const d = new Date(s);
  if(!isNaN(d.getTime())) return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;

  return s;
}

function esCompletado(valor){
  if(valor === true || valor === 1) return true;
  const s = String(valor ?? "")
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .trim()
    .toLowerCase();
  return ["true","si","yes","1","x","ok","aplicado","completado","done"].includes(s);
}

function normalizarHistorial(historial){
  const mapa = {};
  (historial || []).forEach(h=>{
    if(!h) return;
    const fecha = normalizarFechaKey(h.fecha || h.Fecha || h.date || h.Date);
    if(!fecha) return;
    const valor = h.completado ?? h.Completado ?? h.aplicado ?? h.Aplicado ?? h.status ?? h.Status ?? h.estado ?? h.Estado;
    mapa[fecha] = esCompletado(valor);
  });
  return mapa;
}

function construirHistorialCompleto(itemActual, historialServidor){
  const mapa = normalizarHistorial(historialServidor);

  if(itemActual && itemActual.inicio && itemActual.diasCicloTotal){
    const total = Number(itemActual.diasCicloTotal);
    const hoy = todayKey();
    const filas = [];

    for(let i = 0; i < total; i++){
      const fecha = addDaysKey(itemActual.inicio, i);
      if(fecha > hoy) break;
      filas.push({ fecha, completado: !!mapa[fecha] });
    }

    (historialServidor || []).forEach(h=>{
      const fechaExtra = h ? normalizarFechaKey(h.fecha || h.Fecha || h.date || h.Date) : "";
      if(fechaExtra && !filas.some(x=>x.fecha === fechaExtra)){
        const valor = h.completado ?? h.Completado ?? h.aplicado ?? h.Aplicado ?? h.status ?? h.Status ?? h.estado ?? h.Estado;
        filas.push({ fecha:fechaExtra, completado:esCompletado(valor) });
      }
    });

    filas.sort((a,b)=> b.fecha.localeCompare(a.fecha));
    return filas;
  }

  return (historialServidor || []).slice().sort((a,b)=> String(b.fecha || "").localeCompare(String(a.fecha || "")));
}

function calcularDiasRestantesItem(item){
  if(!item || !item.inicio || !item.diasCicloTotal) return 0;

  const inicio = new Date(item.inicio + "T12:00:00");
  const hoy = new Date(todayKey() + "T12:00:00");
  const total = Number(item.diasCicloTotal);
  if(!total) return 0;

  const fin = new Date(inicio);
  fin.setDate(fin.getDate() + total - 1);

  const restantes = Math.round((fin - hoy) / 86400000);
  return Math.max(0, restantes);
}

async function abrirHistorial(categoria, tiempo, nombre){
  try{
    document.getElementById("modal-title").textContent = nombre;
    document.getElementById("modal-subtitle").textContent = `${getCategoriaLabel(categoria)} · ${TIME_LABEL[tiempo] || tiempo}`;
    document.getElementById("modal-content").innerHTML = `<div class="history-empty">Cargando historial...</div>`;
    document.getElementById("history-modal").style.display = "flex";

    const res = await postSheets("getHistorial", { categoria, tiempo, nombre });
    const historialServidor = res.historial || [];

    const itemActual = todayItems.find(it =>
      it.categoria === categoria &&
      it.tiempo === tiempo &&
      it.nombre === nombre
    );

    const historial = construirHistorialCompleto(itemActual, historialServidor);
    const usados = historial.filter(h=>h.completado).length;
    const duracionTotal = itemActual && itemActual.diasCicloTotal ? Number(itemActual.diasCicloTotal) : historial.length;
    const pendientes = itemActual && itemActual.diasCicloTotal ? calcularDiasRestantesItem(itemActual) : 0;
    const pct = duracionTotal ? Math.round(usados / duracionTotal * 100) : 0;

    let html = `
      <div class="history-stats">
        <div class="stat-card">
          <div class="stat-value">${usados}</div>
          <div class="stat-label">Usados</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${pendientes}</div>
          <div class="stat-label">Días restantes</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${pct}%</div>
          <div class="stat-label">Cumplimiento</div>
        </div>
      </div>
    `;

    if(!historial.length){
      html += `<div class="history-empty">Todavía no hay historial para este producto.</div>`;
    }else{
      historial.forEach(h=>{
        html += `
          <div class="history-row">
            <span>${formatFecha(h.fecha)}</span>
            <strong>${h.completado ? "✅ Aplicado" : "❌ No aplicado"}</strong>
          </div>
        `;
      });
    }

    document.getElementById("modal-content").innerHTML = html;

  }catch(e){
    console.error(e);
    document.getElementById("modal-content").innerHTML = `<div class="history-empty">Error cargando historial.</div>`;
  }
}

function agruparProductosPorNombre(productos){
  const map = {};

  productos.forEach(p=>{
    const key = String(p.nombre || "").trim();
    if(!map[key]){
      map[key] = {
        nombre:p.nombre,
        categoria:p.categoria,
        usados:0,
        esperados:0,
        horarios:[]
      };
    }

    const usados = Number(p.usados || 0);
    const esperados = Number(p.esperados || 0);
    map[key].usados += usados;
    map[key].esperados += esperados;
    map[key].horarios.push({
      tiempo:p.tiempo,
      usados,
      esperados,
      pct:p.pct,
      nombre:p.nombre,
      categoria:p.categoria
    });
  });

  return Object.values(map).map(g=>{
    g.pendientes = Math.max(0, g.esperados - g.usados);
    g.pct = g.esperados ? Math.min(100, Math.round(g.usados / g.esperados * 100)) : null;
    return g;
  }).sort((a,b)=>{
    if(b.pendientes !== a.pendientes) return b.pendientes - a.pendientes;
    const ap = a.pct === null || a.pct === undefined ? 101 : a.pct;
    const bp = b.pct === null || b.pct === undefined ? 101 : b.pct;
    if(ap !== bp) return ap - bp;
    return String(a.nombre).localeCompare(String(b.nombre));
  });
}

function abrirDetalleCategoriaRitmo(categoria){
  if(!ritmoReport) return;

  const cat = (ritmoReport.categorias || []).find(c => c.categoria === categoria) || null;
  const label = cat ? cat.label : getCategoriaLabel(categoria);
  const productosBase = (ritmoReport.productos || []).filter(p => p.categoria === categoria);
  const productos = agruparProductosPorNombre(productosBase);

  const esperados = productos.reduce((s,p)=> s + Number(p.esperados || 0), 0);
  const usados = productos.reduce((s,p)=> s + Number(p.usados || 0), 0);
  const pendientes = Math.max(0, esperados - usados);
  const pct = esperados ? Math.min(100, Math.round(usados / esperados * 100)) : 0;

  const peor = productos
    .filter(p => Number(p.esperados || 0) > 0)
    .filter(p => p.pendientes > 0)
    .sort((a,b)=> b.pendientes - a.pendientes || (a.pct || 0) - (b.pct || 0))[0] || null;

  document.getElementById("modal-title").textContent = label;
  document.getElementById("modal-subtitle").textContent = `Detalle de ${ritmoReport.periodoLabel || "este periodo"}`;
  document.getElementById("history-modal").style.display = "flex";

  const showSoft = pct < 10 || usados <= 0;
  let html = `
    <div class="category-ritmo-hero">
      <div class="category-ritmo-top">
        <div>
          <div class="category-ritmo-label">Ritmo</div>
          <div class="category-ritmo-message">${escapeHtml(getRitmoEstado(pct))}</div>
        </div>
        <div class="category-ritmo-pct">${pct}%</div>
      </div>
      <div class="bar"><div class="fill" style="width:${pct}%"></div></div>
      <div class="category-ritmo-note">${escapeHtml(ritmoCategoriaTexto(pct, usados))}</div>
    </div>
  `;

  if(peor && !showSoft){
    html += `
      <div class="ritmo-card">
        <div class="ritmo-card-title">Producto a reforzar</div>
        <div class="ritmo-insight">${escapeHtml(peor.nombre)} es el principal punto a reforzar en este periodo.</div>
      </div>
    `;
  }

  html += `<div class="ritmo-card"><div class="ritmo-card-title">Productos</div>`;

  if(!productos.length){
    html += `<div class="ritmo-empty">No hay productos o acciones en esta categoría durante este periodo.</div>`;
  }else{
    productos.forEach((p, idx)=>{
      const groupId = `prod-group-${cleanId(categoria)}-${idx}`;
      const statusText = resumenProductoTexto(p.usados, p.esperados, p.pct || 0);
      const registrosText = p.usados > 0
        ? `${p.usados} registro${p.usados === 1 ? "" : "s"} en este periodo`
        : "Sin registros todavía";
      const subtitle = p.esperados
        ? `${statusText}${p.usados > 0 ? ` · ${p.pct}% ritmo · ${p.usados} registro${p.usados === 1 ? "" : "s"}` : ""}`
        : registrosText;

      html += `
        <div class="product-group" id="${groupId}">
          <div class="product-group-head" onclick="toggleProductGroup('${groupId}')">
            <div>
              <div class="product-group-title">${escapeHtml(p.nombre)}</div>
              <div class="product-group-status">${escapeHtml(subtitle)}</div>
            </div>
            <div class="product-group-value">⌄</div>
          </div>
          <div class="product-hours">
            ${p.horarios.map(h=>{
              const hPct = h.esperados ? Math.round((h.usados / h.esperados) * 100) : null;
              const hText = h.esperados && h.usados > 0
                ? `${h.usados}/${h.esperados} · ${hPct}% ritmo`
                : (h.usados > 0 ? `${h.usados} registro${h.usados === 1 ? "" : "s"}` : "Sin registro");
              return `<div class="hour-row" onclick="event.stopPropagation(); abrirHistorial('${escapeAttr(h.categoria)}','${escapeAttr(h.tiempo)}','${escapeAttr(h.nombre)}')"><span>${escapeHtml(TIME_LABEL[h.tiempo] || h.tiempo)}</span><strong>${hText}</strong></div>`;
            }).join("")}
          </div>
        </div>
      `;
    });
  }

  html += `</div>
    <div class="ritmo-card">
      <div class="note">Esta vista te ayuda a entender qué hiciste en ${escapeHtml(label)} durante el periodo seleccionado. Los horarios quedan guardados como detalle para revisar solo cuando lo necesites.</div>
    </div>
  `;

  document.getElementById("modal-content").innerHTML = html;
}

function renderRitmoReport(cont){
  const r = ritmoReport;
  const periodLabel = r && r.periodoLabel ? r.periodoLabel : "Este mes";

  let html = `
    <div class="ritmo-controls">
      <button class="ritmo-pill ${ritmoPeriodo === "7d" ? "active" : ""}" onclick="setRitmoPeriodo('7d')">7 días</button>
      <button class="ritmo-pill ${ritmoPeriodo === "mes" ? "active" : ""}" onclick="setRitmoPeriodo('mes')">Este mes</button>
      <button class="ritmo-pill ${ritmoPeriodo === "mes_anterior" ? "active" : ""}" onclick="setRitmoPeriodo('mes_anterior')">Mes anterior</button>
    </div>
  `;

  if(!r){
    cont.innerHTML = html + `<div class="ritmo-empty">Cargando tu ritmo...</div>`;
    return;
  }

  const cats = (r.categorias || []).slice(0,6);
  const productos = (r.productos || []).slice(0,20);

  html += `
    <div class="ritmo-card">
      <div class="ritmo-insight">
        ${escapeHtml(getRitmoEstado(r.pct || 0))}. ${escapeHtml(r.insight || "Tu ritmo te ayuda a entender si estás creando las condiciones para ver cambios.")}
      </div>
    </div>

    <div class="ritmo-card">
      <div class="ritmo-card-title">Por categoría · ${escapeHtml(periodLabel)}</div>
      <div class="note" style="margin-bottom:6px;">Toca una categoría para ver sus productos.</div>
      ${cats.length ? cats.map(c=>`
        <div class="ritmo-row clickable" onclick="abrirDetalleCategoriaRitmo('${escapeAttr(c.categoria)}')">
          <div class="ritmo-row-left"><span class="ritmo-dot ${pctClass(c.pct || 0)}"></span>${escapeHtml(c.label || c.categoria)}</div>
          <div class="ritmo-value">${c.pct || 0}% ›</div>
        </div>
      `).join("") : `<div class="ritmo-empty">Todavía no hay datos suficientes.</div>`}
    </div>

    <div class="ritmo-mini-grid">
      <div class="ritmo-mini">
        <div class="ritmo-mini-label">Más fuerte</div>
        <div class="ritmo-mini-value">${escapeHtml(r.fuerte || "-")}</div>
      </div>
      <div class="ritmo-mini">
        <div class="ritmo-mini-label">A reforzar</div>
        <div class="ritmo-mini-value">${escapeHtml(r.debil || "-")}</div>
      </div>
      <div class="ritmo-mini">
        <div class="ritmo-mini-label">Mejor horario</div>
        <div class="ritmo-mini-value">${escapeHtml(r.mejorHorario || "-")}</div>
      </div>
      <div class="ritmo-mini">
        <div class="ritmo-mini-label">Horario débil</div>
        <div class="ritmo-mini-value">${escapeHtml(r.horarioDebil || "-")}</div>
      </div>
    </div>

    <div class="ritmo-card">
      <div class="ritmo-card-title">Producto a reforzar</div>
      ${r.peorProducto ? `
        <div class="ritmo-insight">
          ${escapeHtml(r.peorProducto.nombre)} es el producto que más conviene reforzar en este periodo.
        </div>
      ` : `<div class="ritmo-empty">Todavía no hay suficiente información para detectar un producto a reforzar.</div>`}
    </div>

  `;

  cont.innerHTML = html;
}

function getProgressMood(pct){
  if(pct >= 90) return "Listo";
  if(pct >= 70) return "Casi listo";
  if(pct >= 30) return "Buen ritmo";
  if(pct > 0) return "Arrancando";
  return "Por empezar";
}

function render(){
  document.getElementById("main-title").textContent = viewMode === "ritmo" ? "Mi ritmo" : "Hoy";
  document.getElementById("date").textContent = viewMode === "ritmo" ? "¿Qué ritmo traes?" : localDateText();
  syncViewModeUI();

  const cont = document.getElementById("categories-container");
  const filter = document.getElementById("time-filter");
  const note = document.getElementById("filter-note");

  if(filter){
    filter.value = selectedTiempo;
    filter.style.display = viewMode === "ritmo" ? "none" : "block";
  }
  if(cont) cont.innerHTML = "";

  if(viewMode === "ritmo"){
    const r = ritmoReport;
    const pct = r && r.esperados ? Number(r.pct || 0) : 0;
    document.getElementById("summary-title").textContent = "Mi ritmo";
    document.getElementById("pct").textContent = r && r.esperados ? pct + "%" : "—";
    document.getElementById("ritmo-msg").textContent = r && r.esperados ? getRitmoMensaje(pct) : "Vas creando tu ritmo. Registra tu rutina para empezar a ver tu avance.";
    document.getElementById("fill").style.width = r && r.esperados ? pct + "%" : "0%";
    document.getElementById("done-count").textContent = "";
    document.getElementById("pending-count").textContent = "";
    if(note) note.textContent = "";
    renderRitmoReport(cont);
    return;
  }

  document.getElementById("summary-title").textContent = "Ritmo de hoy";

  todayItems = flattenPlan();

  let total = todayItems.length;
  let done = todayItems.filter(it => getCheck(it.categoria, it.tiempo, it.nombre)).length;
  let pct = total ? Math.round(done / total * 100) : 0;

  document.getElementById("pct").textContent = pct + "%";
  document.getElementById("ritmo-msg").textContent = getRitmoMensaje(pct);
  document.getElementById("fill").style.width = pct + "%";
  document.getElementById("done-count").textContent = `${done}/${total} completados`;
  document.getElementById("pending-count").textContent = `${Math.max(0,total-done)} pendientes`;

  const visibleItems = selectedTiempo === "todo"
    ? todayItems
    : todayItems.filter(it => it.tiempo === selectedTiempo);

  const visibleDone = visibleItems.filter(it => getCheck(it.categoria, it.tiempo, it.nombre)).length;
  if(note){
    if(selectedTiempo === "todo"){
      note.textContent = visibleItems.length
        ? `Mostrando ${visibleDone}/${visibleItems.length} actividades de hoy por categoría.`
        : "No hay actividades programadas para hoy.";
    }else{
      note.textContent = visibleItems.length
        ? `Mostrando ${visibleDone}/${visibleItems.length} actividades de ${TIME_LABEL[selectedTiempo].toLowerCase()}.`
        : `No hay actividades programadas para ${TIME_LABEL[selectedTiempo].toLowerCase()}.`;
    }
  }

  if(!visibleItems.length){
    cont.innerHTML = `<div class="empty">Nada programado en esta vista.</div>`;
    return;
  }

  const grupos = groupByCategoria(visibleItems);

  grupos.forEach(grupo=>{
    const wrapper = document.createElement("div");
    wrapper.className = "category-group";

    if(grupo.categoria !== "__sin_categoria__"){
      const catId = cleanId("vista-" + selectedTiempo + "-" + grupo.categoria);

      if(openCategories[catId] === undefined){
        openCategories[catId] = false;
      }

      const doneCat = grupo.items.filter(it => getCheck(it.categoria, it.tiempo, it.nombre)).length;

      const header = document.createElement("div");
      header.className = "category-header";
      header.onclick = () => toggleCategoria(catId);
      header.innerHTML = `
        <div class="category-title">
          <span class="category-caret" id="cat-caret-${catId}">${openCategories[catId] ? "⌄" : "›"}</span>
          <span class="category-icon">${getCategoriaIcon(grupo.categoria)}</span>
          <span>${escapeHtml(getCategoriaLabel(grupo.categoria))}</span>
        </div>
        <div class="category-actions">
          <span class="category-count">${doneCat}/${grupo.items.length}</span>
        </div>
      `;
      wrapper.appendChild(header);

      const body = document.createElement("div");
      body.className = "category-body";
      body.id = "cat-body-" + catId;
      body.style.display = openCategories[catId] ? "block" : "none";

      grupo.items.forEach(it=>{
        body.appendChild(renderItem(it));
      });

      wrapper.appendChild(body);
    }else{
      grupo.items.forEach(it=>{
        wrapper.appendChild(renderItem(it));
      });
    }

    cont.appendChild(wrapper);
  });

  saveOpenCategories();
}

async function toggleCheck(categoria, tiempo, nombre){
  try{
    const current = getCheck(categoria, tiempo, nombre);
    if(!checksObj[categoria]) checksObj[categoria] = {};
    if(!checksObj[categoria][tiempo]) checksObj[categoria][tiempo] = {};
    checksObj[categoria][tiempo][nombre] = !current;
    render();

    await postSheets("saveCheck", {
      fecha: todayKey(),
      categoria,
      tiempo,
      nombre,
      completado: !current
    });

    // Releer checks después de guardar para confirmar que quedó sincronizado
    const checksRes = await postSheets("getChecks", { fecha: todayKey() });
    checksObj = checksRes.checks || checksObj;
    setStatus("Sincronizado", "ok");
    render();
  }catch(e){
    console.error(e);
    setStatus("Error guardando", "err");
    showError(e.message || String(e));
    await cargar();
  }
}

async function guardarProducto(){
  try{
    const data = {
      nombre: document.getElementById("p-nombre").value,
      categoria: document.getElementById("p-categoria").value,
      frecuencia: document.getElementById("p-frecuencia").value,
      horario: document.getElementById("p-horario").value,
      dias: document.getElementById("p-dias").value,
      inicio: document.getElementById("p-inicio").value,
      duracion: document.getElementById("p-duracion").value,
      nota: document.getElementById("p-nota").value,
      activo: "si"
    };

    await postSheets("addProducto", data);

    alert("Producto guardado");
    closeAddModal();
    cargar(); // recarga la app

  }catch(e){
    alert("Error: " + e.message);
  }
}
